enabled = false
name = "ethereum"
chain_id = 1

# HyperRPC (fast JSON-RPC)
# Official endpoints: https://eth.rpc.hypersync.xyz or https://1.rpc.hypersync.xyz
rpc_url = "https://1.rpc.hypersync.xyz"

# HyperSync (direct data API)
# Official endpoints: https://eth.hypersync.xyz or https://1.hypersync.xyz
hypersync_url = "https://1.hypersync.xyz"

# HyperIndex (GraphQL) — fill with your deployed indexer endpoint for Ethereum
hyperindex_url = "https://indexer.hyperindex.xyz/REPLACE_WITH_PROJECT_ID/v1/graphql"

[gas]
max_gwei = 80.0
priority_gwei = 2.0
block_time_seconds = 12.0

[execution]
executor_address = "0x0000000000000000000000000000000000000000"
slippage_bps = 50
min_profit_usd = 10.0
max_route_hops = 4

[dex.uniswap_v2]
