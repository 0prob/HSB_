enabled = true
name = "polygon"
chain_id = 137

rpc_url = "https://polygon-rpc.com"
hypersync_url = "wss://polygon.hypersync.example"   # replace with real HyperSync endpoint
hyperindex_url = "https://polygon.hyperindex.example/graphql"  # replace with real HyperIndex endpoint

[gas]
# rough defaults; tune after measuring
max_gwei = 80.0
priority_gwei = 5.0
block_time_seconds = 2.1

[execution]
# address of deployed ArbExecutor on Polygon
executor_address = "0x0000000000000000000000000000000000000000"
slippage_bps = 50          # 0.50%
